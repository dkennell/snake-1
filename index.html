
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #wrap { padding: 1.5rem 0; display: flex; flex-direction: column; align-items: center; gap: 1rem; font-family: var(--font-sans); }
  #hud { display: flex; justify-content: space-between; width: 480px; font-size: 13px; color: var(--color-text-secondary); }
  #hud span { font-weight: 500; color: var(--color-text-primary); }
  #demo-badge { display: none; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; background: #FAEEDA; border: 0.5px solid #BA7517; color: #633806; padding: 2px 10px; border-radius: 99px; }
  canvas { display: block; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); }
  #msg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: rgba(0,0,0,0.45); border-radius: var(--border-radius-md); }
  #msg-title { font-size: 22px; font-weight: 500; color: #fff; }
  #msg-sub { font-size: 14px; color: rgba(255,255,255,0.7); }
  .msg-btns { display: flex; gap: 10px; margin-top: 8px; }
  .msg-btn { padding: 10px 24px; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .msg-btn:hover { opacity: 0.85; }
  #msg-start { background: #fff; color: #111; }
  #msg-demo { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3) !important; }
  #canvas-wrap { position: relative; }
  #dpad { display: none; gap: 6px; flex-direction: column; align-items: center; margin-top: 0.5rem; }
  .dpad-row { display: flex; gap: 6px; }
  .dpad-btn { width: 48px; height: 48px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--color-text-primary); -webkit-tap-highlight-color: transparent; user-select: none; }
  .dpad-btn:active { background: var(--color-border-secondary); }
  @media (pointer: coarse) { #dpad { display: flex; } }
</style>

<h2 class="sr-only">Snake game with smiley face and smart demo mode</h2>

<div id="wrap">
  <div id="hud">
    <div>Score: <span id="score-val">0</span></div>
    <div id="demo-badge">AUTO</div>
    <div>Best: <span id="best-val">0</span></div>
    <div>Speed: <span id="speed-val">1</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c" width="480" height="480"></canvas>
    <div id="msg">
      <div id="msg-title">Snake 😊</div>
      <div id="msg-sub">Use arrow keys or WASD</div>
      <div class="msg-btns">
        <button class="msg-btn" id="msg-start" onclick="startGame(false)">Play</button>
        <button class="msg-btn" id="msg-demo" onclick="startGame(true)">Watch demo</button>
      </div>
    </div>
  </div>
  <div id="dpad">
    <div class="dpad-row"><button class="dpad-btn" onclick="dpadPress('ArrowUp')">↑</button></div>
    <div class="dpad-row">
      <button class="dpad-btn" onclick="dpadPress('ArrowLeft')">←</button>
      <button class="dpad-btn" onclick="dpadPress('ArrowDown')">↓</button>
      <button class="dpad-btn" onclick="dpadPress('ArrowRight')">→</button>
    </div>
  </div>
</div>

<script>
const COLS = 24, ROWS = 24, CELL = 20;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-val');
const bestEl = document.getElementById('best-val');
const speedEl = document.getElementById('speed-val');
const msgEl = document.getElementById('msg');
const msgTitle = document.getElementById('msg-title');
const demoBadge = document.getElementById('demo-badge');

let snake, dir, nextDir, food, score, best = 0, gameLoop, running = false, dead = false, demoMode = false;

function startGame(demo) {
  demoMode = demo;
  msgEl.style.display = 'none';
  demoBadge.style.display = demo ? 'block' : 'none';
  snake = [{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; scoreEl.textContent = 0;
  dead = false; running = true;
  placeFood();
  clearInterval(gameLoop);
  setSpeed(demo ? 4 : 1);
  draw();
}

function getSpeed(s) { return Math.max(60, 160 - (s-1)*15); }
function setSpeed(s) {
  clearInterval(gameLoop);
  const lvl = Math.min(s, 8);
  speedEl.textContent = lvl;
  gameLoop = setInterval(tick, getSpeed(lvl));
}

function placeFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

const MOVES = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];

function bfs(start, goal, occupied) {
  const blocked = new Set(occupied.map(s => s.x+','+s.y));
  const queue = [[start]];
  const visited = new Set([start.x+','+start.y]);
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length-1];
    if (cur.x===goal.x && cur.y===goal.y) return path;
    for (const m of MOVES) {
      const nx = cur.x+m.x, ny = cur.y+m.y, key = nx+','+ny;
      if (nx<0||nx>=COLS||ny<0||ny>=ROWS||blocked.has(key)||visited.has(key)) continue;
      visited.add(key);
      queue.push([...path, {x:nx,y:ny}]);
    }
  }
  return null;
}

function floodFill(start, occupied) {
  const blocked = new Set(occupied.map(s => s.x+','+s.y));
  const visited = new Set([start.x+','+start.y]);
  const queue = [start];
  while (queue.length) {
    const cur = queue.shift();
    for (const m of MOVES) {
      const nx = cur.x+m.x, ny = cur.y+m.y, key = nx+','+ny;
      if (nx<0||nx>=COLS||ny<0||ny>=ROWS||blocked.has(key)||visited.has(key)) continue;
      visited.add(key); queue.push({x:nx,y:ny});
    }
  }
  return visited.size;
}

function getAIDir() {
  const head = snake[0];

  // Try direct BFS path to food
  const pathToFood = bfs(head, food, snake);

  if (pathToFood && pathToFood.length > 1) {
    // Simulate the snake after taking this full path to food
    const simSnake = snake.map(s=>({...s}));
    for (let i = 1; i < pathToFood.length; i++) {
      simSnake.unshift({...pathToFood[i]});
      // Only pop tail on non-eating steps; last step eats so keep tail
      if (i < pathToFood.length - 1) simSnake.pop();
    }
    // After eating, check we have reasonable open space (at least 20% of board)
    const openAfter = floodFill(simSnake[0], simSnake.slice(1));
    const minSafe = Math.floor(COLS * ROWS * 0.20);
    if (openAfter >= minSafe) {
      const step = pathToFood[1];
      return {x: step.x - head.x, y: step.y - head.y};
    }
  }

  // Food path unsafe or unreachable — pick move with most open space
  let bestMove = null, bestSpace = -1;
  for (const m of MOVES) {
    const nx = head.x+m.x, ny = head.y+m.y;
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    if (snake.some(s=>s.x===nx&&s.y===ny)) continue;
    // Don't reverse
    if (m.x===-dir.x && m.y===-dir.y) continue;
    const space = floodFill({x:nx,y:ny}, snake);
    if (space > bestSpace) { bestSpace = space; bestMove = m; }
  }

  // If we found a good open move, take it
  if (bestMove && bestSpace > snake.length) return bestMove;

  // Last resort: any non-lethal move
  for (const m of MOVES) {
    const nx = head.x+m.x, ny = head.y+m.y;
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    if (snake.some(s=>s.x===nx&&s.y===ny)) continue;
    return m;
  }
  return dir;
}

function tick() {
  if (!running) return;
  if (demoMode) nextDir = getAIDir();
  dir = nextDir;
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    endGame(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    placeFood();
    if (!demoMode) setSpeed(1 + Math.floor(score/5));
  } else {
    snake.pop();
  }
  draw();
}

function endGame() {
  running = false; dead = true;
  clearInterval(gameLoop);
  demoBadge.style.display = 'none';
  msgTitle.textContent = demoMode ? 'Demo over 😅' : 'Game over 😢';
  document.getElementById('msg-sub').textContent = 'Score: ' + score;
  document.querySelector('.msg-btns').innerHTML = `
    <button class="msg-btn" id="msg-start" onclick="startGame(false)">Play</button>
    <button class="msg-btn" id="msg-demo" onclick="startGame(true)">Watch demo</button>`;
  msgEl.style.display = 'flex';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawSmiley(cx, cy, r, angle) {
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle='#FFD700'; ctx.fill();
  ctx.strokeStyle='#B8860B'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-r*0.3,-r*0.2,r*0.12,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.3,-r*0.2,r*0.12,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0,r*0.1,r*0.45,0.15,Math.PI-0.15);
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();
}

function dirToAngle(d) {
  if (d.x===1) return 0; if (d.x===-1) return Math.PI;
  if (d.y===1) return Math.PI/2; return -Math.PI/2;
}

function draw() {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke();}
  for (let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke();}
  for (let i=snake.length-1;i>=1;i--) {
    const s=snake[i];
    ctx.fillStyle = i<snake.length*0.4 ? (isDark?'#A89040':'#D4A843') : (isDark?'#7A6830':'#E8C87A');
    roundRect(ctx,s.x*CELL+3,s.y*CELL+3,CELL-6,CELL-6,4); ctx.fill();
  }
  const h=snake[0];
  drawSmiley(h.x*CELL+CELL/2, h.y*CELL+CELL/2, CELL/2-1, dirToAngle(dir));
  ctx.fillStyle=isDark?'#E05050':'#C0392B';
  roundRect(ctx,food.x*CELL+3,food.y*CELL+3,CELL-6,CELL-6,4); ctx.fill();
  ctx.fillStyle=isDark?'#80C080':'#27AE60';
  roundRect(ctx,food.x*CELL+6,food.y*CELL+2,5,5,2); ctx.fill();
}

const keyMap={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
document.addEventListener('keydown', e => {
  const d=keyMap[e.key]; if(!d) return;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(demoMode) return;
  if(!running&&!dead){startGame(false);return;}
  if(running&&!(d.x===-dir.x&&d.y===-dir.y)) nextDir=d;
});
function dpadPress(key){const d=keyMap[key];if(!d||demoMode)return;if(!running){startGame(false);return;}if(!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;}
</script>
